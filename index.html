    function clearBlackboard() { if(confirm(langDict[currentLang].confirm_clear)) { saveHistory(); drawings = []; plots = []; activeMeasures = []; groups = []; labelIndex = 0; } }

    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackgroundGrids();
        if (gridType === 4) drawMathFunctionGraph();
        
        for (let i = 0; i < drawings.length; i++) {
            const d = drawings[i];
            if (d.type === 'freehand') {
                drawFreehandPath(d);
            } else {
                if (selectedBaseLine && selectedBaseLine.id === d.id) {
                    ctx.save();
                    d.color = Math.floor(Date.now() / 200) % 2 === 0 ? 'rgba(255, 140, 0, 1)' : 'rgba(255, 69, 0, 0.4)';
                    drawGeomObject(d);
                    ctx.restore();
                } else if (currentMode === 'measure-ang' && (hoveredLineId === d.id || measureLineSequence.includes(d.id))) {
                    ctx.save();
                    let oldColor = d.color;
                    d.color = '#ff9f43';
                    drawGeomObject(d);
                    d.color = oldColor;
                    ctx.restore();
                } else {
                    drawGeomObject(d); 
                }
            }
        }
        
        drawGroupsBoundingBox();

        for (let i = 0; i < plots.length; i++) {
            const p = plots[i];
            const s = toScreen(p.mx, p.my); ctx.beginPath(); 
            
            let radius = p.isFixed ? 10 : 8;
            let isHoveredOrSelected = (currentMode === 'measure-ang' && (hoveredPlotId === p.id || measureClickSequence.includes(p.id)));
            if (isHoveredOrSelected) radius += 4;
            
            ctx.arc(s.x, s.y, radius, 0, Math.PI*2);
            if (selectedPlotIds.includes(p.id)) { ctx.save(); ctx.shadowBlur = 14; ctx.shadowColor = '#00f5d4'; ctx.fillStyle = '#00f5d4'; ctx.fill(); ctx.restore(); } 
            else if (isHoveredOrSelected) { ctx.save(); ctx.shadowBlur = 16; ctx.shadowColor = '#00f5d4'; ctx.fillStyle = '#00f5d4'; ctx.fill(); ctx.restore(); }
            else { ctx.fillStyle = p.isFixed ? '#ff3333' : p.color || '#fff'; ctx.fill(); }
            ctx.strokeStyle = '#0d1f16'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 15px sans-serif'; ctx.fillText(p.id, s.x + 12, s.y - 4);
        }

        processAndDrawMeasurements();
        drawLivePreviewAndTools();
    }

    function drawBackgroundGrids() {
        if (gridType === 0) return;
        const w = canvas.width, h = canvas.height;
        const cx = w / 2 + offsetX, cy = h / 2 + offsetY;
        const step = baseGridSize * scale;
        ctx.save();
        
        if (gridType === 1 || gridType === 4) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)'; ctx.lineWidth = 1;
            for (let x = cx % step; x < w; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
            for (let y = cy % step; y < h; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
        }
        if (gridType === 2) {
            const stepDouble = step * 2;
            const subStep = step * 0.3;
            for (let y = cy % stepDouble; y < h; y += stepDouble) {
                for(let i=0; i<4; i++) {
                    ctx.strokeStyle = (i===2) ? 'rgba(255, 77, 77, 0.35)' : 'rgba(255, 255, 255, 0.12)';
                    ctx.beginPath(); ctx.moveTo(0, y + i*subStep); ctx.lineTo(w, y + i*subStep); ctx.stroke();
                }
            }
        }
        if (gridType === 3) {
            let boxSize = step * 2.5; 
            ctx.strokeStyle = 'rgba(46, 139, 87, 0.4)'; ctx.lineWidth = 1.5; 
            for (let x = cx % boxSize; x < w; x += boxSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
            for (let y = cy % boxSize; y < h; y += boxSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
            
            ctx.strokeStyle = 'rgba(46, 139, 87, 0.25)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            let halfBox = boxSize / 2;
            for (let x = (cx % boxSize) - halfBox; x < w; x += boxSize) { if (x > 0) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); } }
            for (let y = (cy % boxSize) - halfBox; y < h; y += boxSize) { if (y > 0) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); } }
        }
        if (gridType === 4) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
            if (showCoordLabels) {
                ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '11px monospace';
                let startM = toMath(0, h), endM = toMath(w, 0);
                for (let mx = Math.ceil(startM.x/coordStepUnit)*coordStepUnit; mx <= endM.x; mx += coordStepUnit) { if (Math.abs(mx) > 0.001) ctx.fillText(mx.toString(), toScreen(mx, 0).x - 6, cy + 14); }
                for (let my = Math.ceil(startM.y/coordStepUnit)*coordStepUnit; my <= endM.y; my += coordStepUnit) { if (Math.abs(my) > 0.001) ctx.fillText(my.toString(), cx + 8, toScreen(0, my).y + 4); }
            }
        }
        ctx.restore();
    }

    function drawMathFunctionGraph() {
        ctx.save(); ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 3; ctx.beginPath(); let first = true;
        for (let sx = 0; sx < canvas.width; sx += 3) {
            let x = toMath(sx, 0).x; let y = 0;
            try { 
                y = eval(cachedJsFormula); 
            } catch(e) { 
                continue; 
            }
            if (typeof y === 'number' && !isNaN(y) && isFinite(y)) {
                let s = toScreen(x, y); if (first) { ctx.moveTo(s.x, s.y); first = false; } else { ctx.lineTo(s.x, s.y); }
            }
        }
        ctx.stroke(); ctx.restore();
    }

    function setupPenContext(ctx, d) {
        ctx.strokeStyle = d.color || '#fff'; ctx.lineWidth = d.thickness || 6; ctx.setLineDash(d.lineStyle === 'dashed' ? [8, 6] : []);
        ctx.globalAlpha = 1.0; ctx.globalCompositeOperation = 'source-over'; ctx.shadowBlur = 0;
        if (d.penType === 'pencil') { ctx.globalAlpha = 0.75; ctx.lineWidth = Math.max(1.5, d.thickness * 0.4); }
        else if (d.penType === 'highlighter') { ctx.globalAlpha = 0.45; ctx.globalCompositeOperation = 'multiply'; }
        else if (d.penType === 'neon') { ctx.shadowBlur = 16; ctx.shadowColor = d.color || '#00f5d4'; }
    }

    function drawGeomObject(d) {
        ctx.save(); setupPenContext(ctx, d);
        if (selectedDrawingIds.includes(d.id)) { ctx.shadowBlur = 12; ctx.shadowColor = '#00f5d4'; ctx.strokeStyle = '#00f5d4'; }
        const p1 = toScreen(d.mX1, d.mY1); const p2 = toScreen(d.mX2, d.mY2);
        if (d.type === 'segment') { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); } 
        else if (d.type === 'line') {
            let a = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            ctx.beginPath(); ctx.moveTo(p1.x - Math.cos(a)*3000, p1.y - Math.sin(a)*3000); ctx.lineTo(p1.x + Math.cos(a)*3000, p1.y + Math.sin(a)*3000); ctx.stroke();
        } 
        else if (d.type === 'ray') {
            let a = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p1.x + Math.cos(a)*3000, p1.y + Math.sin(a)*3000); ctx.stroke();
        } 
        else if (d.type === 'vector') {
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            let a = Math.atan2(p2.y - p1.y, p2.x - p1.x); ctx.fillStyle = ctx.strokeStyle; ctx.beginPath(); ctx.moveTo(p2.x, p2.y);
            ctx.lineTo(p2.x - 16*Math.cos(a-Math.PI/6), p2.y - 16*Math.sin(a-Math.PI/6)); ctx.lineTo(p2.x - 16*Math.cos(a+Math.PI/6), p2.y - 16*Math.sin(a+Math.PI/6)); ctx.fill();
        } 
        else if (d.type === 'circle') { ctx.beginPath(); ctx.arc(p1.x, p1.y, Math.hypot(p2.x - p1.x, p2.y - p1.y), 0, Math.PI*2); ctx.stroke(); } 
        else if (d.type === 'arc') {
            let r = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            ctx.beginPath(); ctx.arc(p1.x, p1.y, r, d.startAngle || 0, d.endAngle || Math.PI); ctx.stroke();
            if(currentMode === 'select') {
                ctx.fillStyle = '#00f5d4';
                ctx.beginPath(); ctx.arc(p1.x + r*Math.cos(d.startAngle||0), p1.y + r*Math.sin(d.startAngle||0), 6, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(p1.x + r*Math.cos(d.endAngle||Math.PI), p1.y + r*Math.sin(d.endAngle||Math.PI), 6, 0, Math.PI*2); ctx.fill();
            }
        }
        ctx.restore();
    }

    function drawFreehandPath(d) {
        if (!d.pts || d.pts.length < 2) return;
        ctx.save(); setupPenContext(ctx, d);
        if (d.penType === 'chalk') {
            for (let i = 1; i < d.pts.length; i++) {
                const s1 = toScreen(d.pts[i-1].x, d.pts[i-1].y); const s2 = toScreen(d.pts[i].x, d.pts[i].y);
                ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke(); ctx.fillStyle = d.color;
                for(let j=0; j<2; j++) ctx.fillRect(s2.x + (Math.random()-0.5)*d.thickness*1.5, s2.y + (Math.random()-0.5)*d.thickness*1.5, 1.2, 1.2);
            }
        } else {
            ctx.beginPath(); ctx.moveTo(toScreen(d.pts[0].x, d.pts[0].y).x, toScreen(d.pts[0].x, d.pts[0].y).y);
            for (let i = 1; i < d.pts.length; i++) ctx.lineTo(toScreen(d.pts[i].x, d.pts[i].y).x, toScreen(d.pts[i].x, d.pts[i].y).y);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawGroupsBoundingBox() {
        if (groups.length === 0) return;
        ctx.save(); ctx.strokeStyle = 'rgba(0, 245, 212, 0.45)'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
        groups.forEach(g => {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity; let hasPoints = false;
            g.plotIds.forEach(id => {
                let p = plots.find(pt => pt.id === id);
                if (p) {
                    let s = toScreen(p.mx, p.my);
                    if(s.x < minX) minX = s.x; if(s.x > maxX) maxX = s.x; if(s.y < minY) minY = s.y; if(s.y > maxY) maxY = s.y; hasPoints = true;
                }
            });
            if (hasPoints) {
                ctx.strokeRect(minX - 15, minY - 15, (maxX - minX) + 30, (maxY - minY) + 30);
                ctx.fillStyle = 'rgba(0, 245, 212, 0.02)'; ctx.fillRect(minX - 15, minY - 15, (maxX - minX) + 30, (maxY - minY) + 30);
            }
        });
        ctx.restore();
    }

    function toggleAngleFlip(idx) { 
        if (activeMeasures[idx]) { 
            activeMeasures[idx].flip = !activeMeasures[idx].flip;
        } 
    }

    function processAndDrawMeasurements() {
        // テキスト情報を蓄積し、中身が真に変化した時のみDOM反映(ちらつき防止とイベント維持)
        let htmlBuffer = "";
        
        if (currentMode === 'select' && selectedDrawingIds.length === 1 && gridType === 4) {
            let activeDrawing = drawings.find(d => d.id === selectedDrawingIds[0]);
            if (activeDrawing && ['line', 'segment', 'ray', 'vector'].includes(activeDrawing.type)) {
                let dx = activeDrawing.mX2 - activeDrawing.mX1;
                let dy = activeDrawing.mY2 - activeDrawing.mY1;
                if (Math.abs(dx) > 0.0001) {
                    let slope = dy / dx;
                    let intercept = activeDrawing.mY1 - slope * activeDrawing.mX1;
                    let sign = intercept >= 0 ? "+ " : "- ";
                    let absInt = Math.abs(intercept).toFixed(2);
                    let eqString = `y = ${slope.toFixed(2)}x ${sign}${absInt}`;
                    
                    htmlBuffer += `<li style="color: #00f5d4;">${currentLang === 'ja' ? '選択中の直線: ' : 'Selected Line: '}${eqString}</li>`;
                    
                    if (document.activeElement !== kidsFormulaInput && document.activeElement.id !== 'fracNumerator' && document.activeElement.id !== 'fracDenominator') {
                        kidsFormulaInput.value = `${slope.toFixed(2)}*x ${intercept >= 0 ? '+' : '-'}${absInt}`;
                        cachedJsFormula = translateKidsToJs(kidsFormulaInput.value);
                        parseAndSyncFractionDisplay(kidsFormulaInput.value);
                    }
                } else {
                    htmlBuffer += `<li style="color: #ff4d4d;">x = ${activeDrawing.mX1.toFixed(2)}</li>`;
                }
            }
        }

        activeMeasures.forEach((m, idx) => {
            if (m.type === 'len') {
                const p1 = plots.find(p => p.id === m.p1); const p2 = plots.find(p => p.id === m.p2); if (!p1 || !p2) return;
                let dist = Math.hypot(p2.mx - p1.mx, p2.my - p1.my);
                htmlBuffer += `<li>${currentLang === 'ja' ? `直線 ${p1.id}${p2.id} = ${dist.toFixed(2)}` : `Line ${p1.id}${p2.id} = ${dist.toFixed(2)}`}</li>`;
                
                const s1 = toScreen(p1.mx, p1.my); const s2 = toScreen(p2.mx, p2.my);
                ctx.save(); ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 2; ctx.setLineDash([3, 3]); ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
                ctx.fillStyle = '#ffff00'; ctx.font = 'bold 13px monospace'; ctx.fillText(dist.toFixed(2), (s1.x+s2.x)/2 + 12, (s1.y+s2.y)/2); ctx.restore();
            }
            if (m.type === 'ang') {
                const p1 = plots.find(p => p.id === m.p1); const p2 = plots.find(p => p.id === m.p2); const p3 = plots.find(p => p.id === m.p3); if (!p1 || !p2 || !p3) return;
                
                // スクリーン座標系に変換して計算（Y軸反転を正しく吸収するため）
                const s1 = toScreen(p1.mx, p1.my);
                const s2 = toScreen(p2.mx, p2.my);
                const s3 = toScreen(p3.mx, p3.my);
                
                let a1 = Math.atan2(s1.y - s2.y, s1.x - s2.x); 
                let a3 = Math.atan2(s3.y - s2.y, s3.x - s2.x);
                
                let diffAng = a3 - a1;
                while (diffAng < 0) diffAng += Math.PI * 2;
                
                let finalDeg = diffAng * 180 / Math.PI;
                let isAnticlockwise = false;
                
                // 通常は劣角（180度以下）をデフォルトとし、反転フラグで完全に優角/劣角をスイッチさせる
                if (finalDeg > 180) {
                    finalDeg = 360 - finalDeg;
                    isAnticlockwise = true;
                }
                
                if (m.flip) {
                    finalDeg = 360 - finalDeg;
                    isAnticlockwise = !isAnticlockwise;
                }
                
                let btnLabel = currentLang === 'ja' ? '🔄 反転' : '🔄 Flip';
                htmlBuffer += `<li>∠${p1.id}${p2.id}${p3.id} = ${finalDeg.toFixed(1)}° <button class="btn-flip-angle" data-idx="${idx}">${btnLabel}</button></li>`;

                ctx.save(); ctx.strokeStyle = '#ff4d4d'; ctx.lineWidth = 3;
                ctx.beginPath(); 
                ctx.arc(s2.x, s2.y, 28, a1, a3, isAnticlockwise); 
                ctx.stroke();
                
                // テキスト配置用の角度
                let textAng = a1 + (isAnticlockwise ? -1 : 1) * (Math.abs(a3 - a1) / 2);
                if (m.flip) textAng += Math.PI;
                ctx.fillStyle = '#ff4d4d'; ctx.font = 'bold 14px monospace'; 
                ctx.fillText(`${finalDeg.toFixed(1)}°`, s2.x + 36 * Math.cos(textAng) - 10, s2.y + 36 * Math.sin(textAng) + 4); 
                ctx.restore();
            }
        });

        // 内部文字列が変わった時だけ書き換える（クリックイベントを保護）
        if (measureOutput.innerHTML !== htmlBuffer) {
            measureOutput.innerHTML = htmlBuffer;
        }
    }

    function drawLivePreviewAndTools() {
        if (!isDrawing) return;
        ctx.save();
        
        if (['segment', 'line', 'ray', 'vector'].includes(currentMode) && dragStartMath) {
            const p1 = toScreen(dragStartMath.x, dragStartMath.y);
            ctx.strokeStyle = currentColor; ctx.lineWidth = currentThickness; ctx.globalAlpha = 0.5;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            if (currentMode === 'segment' || currentMode === 'vector') {
                ctx.moveTo(p1.x, p1.y); ctx.lineTo(currentX, currentY);
            } else {
                let a = Math.atan2(currentY - p1.y, currentX - p1.x);
                ctx.moveTo(p1.x - Math.cos(a)*3000, p1.y - Math.sin(a)*3000); ctx.lineTo(p1.x + Math.cos(a)*3000, p1.y + Math.sin(a)*3000);
            }
            ctx.stroke();
        }
        else if ((currentMode === 'compass' || currentMode === 'arc') && dragStartMath) {
            // かっこいいコンパスアニメーションの描画
            const p1 = toScreen(dragStartMath.x, dragStartMath.y);
            let r = Math.hypot(currentX - p1.x, currentY - p1.y);
            
            // 下地円
            ctx.strokeStyle = currentColor; ctx.lineWidth = currentThickness; ctx.globalAlpha = 0.3;
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.arc(p1.x, p1.y, r, 0, Math.PI*2); ctx.stroke();
            
            // コンパス脚部の計算
            let midX = (p1.x + currentX) / 2;
            let midY = (p1.y + currentY) / 2;
            let angle = Math.atan2(currentY - p1.y, currentX - p1.x);
            
            // 中点から直交方向にコンパスの頭（ヒンジ）を浮かせる
            let headDist = Math.max(70, r * 0.8); 
            let headX = midX + Math.cos(angle - Math.PI / 2) * headDist;
            let headY = midY + Math.sin(angle - Math.PI / 2) * headDist;
            
            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(0,0,0,0.5)';
            
            // 1. 針側の脚（金属シルバー）
            ctx.strokeStyle = '#b2bec3'; ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(headX, headY);
            ctx.lineTo(p1.x, p1.y);
            ctx.stroke();
            
            // 2. 鉛筆側の脚（設定中のチョークカラー）
            ctx.strokeStyle = '#dfe6e9'; ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(headX, headY);
            let pLegMidX = headX + (currentX - headX) * 0.65;
            let pLegMidY = headY + (currentY - headY) * 0.65;
            ctx.lineTo(pLegMidX, pLegMidY);
            ctx.stroke();
            
            // 鉛筆アタッチメントと芯
            ctx.strokeStyle = currentColor; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(pLegMidX, pLegMidY);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();
            
            // 3. 各種ジョイント・針先の強調
            ctx.fillStyle = '#6c5ce7'; ctx.beginPath(); ctx.arc(headX, headY, 8, 0, Math.PI*2); ctx.fill(); // 頭部ネジ
            ctx.fillStyle = '#2d3436'; ctx.beginPath(); ctx.arc(p1.x, p1.y, 3, 0, Math.PI*2); ctx.fill(); // 針の先端
            ctx.fillStyle = '#ff7675'; ctx.beginPath(); ctx.arc(pLegMidX, pLegMidY, 5, 0, Math.PI*2); ctx.fill(); // 鉛筆留め具
            
            // 持ち手つまみ
            ctx.strokeStyle = '#74b9ff'; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(headX, headY);
            ctx.lineTo(headX + Math.cos(angle - Math.PI / 2) * 18, headY + Math.sin(angle - Math.PI / 2) * 18);
            ctx.stroke();
            
            ctx.restore();
        }
        else if (['parallel', 'perpend'].includes(currentMode) && selectedBaseLine && dragStartMath) {
            const p1 = toScreen(dragStartMath.x, dragStartMath.y);
            let baseAng = Math.atan2(toScreen(selectedBaseLine.mX2, selectedBaseLine.mY2).y - toScreen(selectedBaseLine.mX1, selectedBaseLine.mY1).y, toScreen(selectedBaseLine.mX2, selectedBaseLine.mY2).x - toScreen(selectedBaseLine.mX1, selectedBaseLine.mY1).x);
            let targetAng = (currentMode === 'parallel') ? baseAng : baseAng + Math.PI / 2;
            
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 245, 212, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p1.x - Math.cos(targetAng)*3000, p1.y - Math.sin(targetAng)*3000);
            ctx.lineTo(p1.x + Math.cos(targetAng)*3000, p1.y + Math.sin(targetAng)*3000);
            ctx.stroke();
            
            ctx.translate(p1.x, p1.y);
            ctx.rotate(targetAng);
            ctx.fillStyle = 'rgba(255, 165, 0, 0.15)';
            ctx.strokeStyle = 'rgba(255, 165, 0, 0.4)';
            ctx.lineWidth = 2;
            ctx.fillRect(-200, -15, 400, 30);
            ctx.strokeRect(-200, -15, 400, 30);
            ctx.restore();
        }
        else if (currentMode === 'lasso' && lassoPoints.length > 0) {
            ctx.strokeStyle = 'rgba(0, 245, 212, 0.85)'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]);
            ctx.fillStyle = 'rgba(0, 245, 212, 0.05)'; ctx.beginPath(); ctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
            for(let i=1; i<lassoPoints.length; i++) ctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
            ctx.stroke(); ctx.fill();
        }
        else if (currentMode === 'eraser' && eraserPath.length > 0) {
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 35; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(eraserPath[0].x, eraserPath[0].y);
            for(let i=1; i<eraserPath.length; i++) ctx.lineTo(eraserPath[i].x, eraserPath[i].y);
            ctx.stroke();
        }

        ctx.restore();

        // 手元ツール絵文字インジケータ
        ctx.save();
        ctx.translate(currentX, currentY);
        ctx.fillStyle = '#ffffff'; ctx.font = '32px Arial';
        
        if (currentMode === 'free') {
            ctx.rotate(-Math.PI / 4);
            ctx.fillText(currentPenType === 'chalk' ? '🖍️' : '✏️', -10, 10);
        } else if (['segment', 'line', 'ray', 'parallel', 'perpend'].includes(currentMode)) {
            ctx.rotate(Math.PI / 6);
            ctx.fillText('📏', -15, -5);
        } else if (currentMode === 'vector') {
            ctx.fillText('➔', -10, 10);
        } else if (currentMode === 'compass' || currentMode === 'arc') {
            ctx.fillText('🧭', -12, 12); // コンパスモード時は方位磁針/コンパス絵文字を追従
        } else if (currentMode === 'eraser') {
            ctx.fillText('🧼', -15, 15);
        } else if (currentMode === 'plot') {
            ctx.fillText('📍', -10, 10);
        }
        ctx.restore();
    }

    function startDrawing(e) {
        if (e.target !== canvas) return; isDrawing = true; const m = toMath(e.clientX, e.clientY);
        dragStartMath = m; liveCurrentMath = m; startX = e.clientX; startY = e.clientY; currentX = e.clientX; currentY = e.clientY;

        if (currentMode === 'free') { saveHistory(); activeFreehandPoints = [{ x: m.x, y: m.y }]; }
        else if (currentMode === 'plot') { saveHistory(); plots.push({ id: getNextLabel(), mx: m.x, my: m.y, color: currentColor }); }
        else if (['p-triangle', 'p-iso-triangle', 'p-equ-triangle', 'p-right-triangle', 'p-square', 'p-rhombus', 'p-trapezoid', 'p-parallelogram'].includes(currentMode)) deployPresetShapeAt(currentMode, m.x, m.y);
        else if (['parallel', 'perpend'].includes(currentMode)) {
            let hit = null;
            for(let d of drawings) {
                if (['segment','line','ray','vector'].includes(d.type)) {
                    if (distToSegment({x: e.clientX, y: e.clientY}, toScreen(d.mX1, d.mY1), toScreen(d.mX2, d.mY2)) < 25) { hit = d; break; }
                }
            }
            if(hit) selectedBaseLine = hit;
        }
        else if (currentMode === 'measure-len') {
            let hit = null;
            for(let d of drawings) {
                if (['segment','line','ray','vector'].includes(d.type)) {
                    if (distToSegment({x: e.clientX, y: e.clientY}, toScreen(d.mX1, d.mY1), toScreen(d.mX2, d.mY2)) < 22) { hit = d; break; }
                }
            }
            if (hit && hit.bindP1 && hit.bindP2) {
                saveHistory();
                if (!activeMeasures.some(m => m.type === 'len' && m.p1 === hit.bindP1 && m.p2 === hit.bindP2)) activeMeasures.push({ type: 'len', p1: hit.bindP1, p2: hit.bindP2 });
            }
        }
        else if (currentMode === 'measure-ang') {
            let grabbed = null;
            for (let p of plots) { if (Math.hypot(e.clientX - toScreen(p.mx, p.my).x, e.clientY - toScreen(p.mx, p.my).y) < 22) { grabbed = p; break; } }
            
            if (grabbed) {
                measureLineSequence = [];
                measureClickSequence.push(grabbed.id);
                if (measureClickSequence.length === 3) {
                    saveHistory(); activeMeasures.push({ type: 'ang', p1: measureClickSequence[0], p2: measureClickSequence[1], p3: measureClickSequence[2], flip: false });
                    measureClickSequence = [];
                }
            } else {
                let hitLine = null;
                for (let d of drawings) {
                    if (['segment', 'line', 'ray', 'vector'].includes(d.type)) {
                        if (distToSegment({x: e.clientX, y: e.clientY}, toScreen(d.mX1, d.mY1), toScreen(d.mX2, d.mY2)) < 20) { hitLine = d; break; }
                    }
                }
                if (hitLine) {
                    measureClickSequence = []; 
                    if (!measureLineSequence.includes(hitLine.id)) {
                        measureLineSequence.push(hitLine.id);
                    }
                    if (measureLineSequence.length === 2) {
                        let L1 = drawings.find(d => d.id === measureLineSequence[0]);
                        let L2 = drawings.find(d => d.id === measureLineSequence[1]);
                        measureLineSequence = [];
                        
                        if (L1 && L2 && L1.bindP1 && L1.bindP2 && L2.bindP1 && L2.bindP2) {
                            let commonPt = null; let p1 = null; let p3 = null;
                            if (L1.bindP1 === L2.bindP1) { commonPt = L1.bindP1; p1 = L1.bindP2; p3 = L2.bindP2; }
                            else if (L1.bindP1 === L2.bindP2) { commonPt = L1.bindP1; p1 = L1.bindP2; p3 = L2.bindP1; }
                            else if (L1.bindP2 === L2.bindP1) { commonPt = L1.bindP2; p1 = L1.bindP1; p3 = L2.bindP2; }
                            else if (L1.bindP2 === L2.bindP2) { commonPt = L1.bindP2; p1 = L1.bindP1; p3 = L2.bindP1; }
                            
                            if (commonPt) {
                                saveHistory();
                                activeMeasures.push({ type: 'ang', p1: p1, p2: commonPt, p3: p3, flip: false });
                            } else {
                                let nodeP1 = plots.find(p => p.id === L1.bindP1);
                                let nodeP2 = plots.find(p => p.id === L1.bindP2);
                                saveHistory();
                                activeMeasures.push({ type: 'ang', p1: L2.bindP1, p2: nodeP1.id, p3: nodeP2.id, flip: false });
                            }
                        }
                    }
                }
            }
        }
        else if (['select', 'set-fixed', 'set-bound'].includes(currentMode)) {
            grabbedPlot = null; grabbedArcInfo = null; selectedDrawingIds = [];
            for (let p of plots) { if (Math.hypot(e.clientX - toScreen(p.mx, p.my).x, e.clientY - toScreen(p.mx, p.my).y) < 22) { grabbedPlot = p; break; } }
            
            if (!grabbedPlot && currentMode === 'select') {
                for (let d of drawings) {
                    if (d.type === 'arc') {
                        let pC = toScreen(d.mX1, d.mY1); let r = Math.hypot(toScreen(d.mX2, d.mY2).x - pC.x, toScreen(d.mX2, d.mY2).y - pC.y);
                        let pStart = { x: pC.x + r*Math.cos(d.startAngle), y: pC.y + r*Math.sin(d.startAngle) };
                        let pEnd = { x: pC.x + r*Math.cos(d.endAngle), y: pC.y + r*Math.sin(d.endAngle) };
                        if (Math.hypot(e.clientX - pStart.x, e.clientY - pStart.y) < 24) { grabbedArcInfo = { arc: d, node: 'start' }; saveHistory(); break; }
                        if (Math.hypot(e.clientX - pEnd.x, e.clientY - pEnd.y) < 24) { grabbedArcInfo = { arc: d, node: 'end' }; saveHistory(); break; }
                    }
                }
            }
            if (grabbedPlot) {
                if (currentMode === 'set-fixed') { saveHistory(); grabbedPlot.isFixed = !grabbedPlot.isFixed; } 
                else if (currentMode === 'select') { saveHistory(); groups.forEach(g => { if (g.plotIds.includes(grabbedPlot.id)) selectedPlotIds = [...g.plotIds]; }); }
            } else if (!grabbedArcInfo) {
                for(let d of drawings) {
                    if (['segment','line','ray','vector'].includes(d.type)) {
                        if (distToSegment({x: e.clientX, y: e.clientY}, toScreen(d.mX1, d.mY1), toScreen(d.mX2, d.mY2)) < 18) {
                            selectedDrawingIds = [d.id];
                            lineStyleSelect.value = d.lineStyle || 'solid';
                            penTypeSelect.value = d.penType || 'chalk';
                            thicknessSelect.value = String(d.thickness || 6); break;
                        }
                    }
                }
                if (selectedDrawingIds.length === 0) { startX = e.clientX; startY = e.clientY; }
            }
        }
        else if (currentMode === 'lasso') lassoPoints = [{ x: e.clientX, y: e.clientY }];
        else if (currentMode === 'eraser') { saveHistory(); eraserPath = [{ x: e.clientX, y: e.clientY }]; executeEraserLogic(e.clientX, e.clientY); }
    }

    function draw(e) {
        const m = toMath(e.clientX, e.clientY); liveCurrentMath = m;
        let dx = e.clientX - startX; let dy = e.clientY - startY; currentX = e.clientX; currentY = e.clientY;

        if (currentMode === 'measure-ang') {
            hoveredPlotId = null; hoveredLineId = null;
            for (let p of plots) {
                if (Math.hypot(e.clientX - toScreen(p.mx, p.my).x, e.clientY - toScreen(p.mx, p.my).y) < 22) { hoveredPlotId = p.id; break; }
            }
            if (!hoveredPlotId) {
                for (let d of drawings) {
                    if (['segment', 'line', 'ray', 'vector'].includes(d.type)) {
                        if (distToSegment({x: e.clientX, y: e.clientY}, toScreen(d.mX1, d.mY1), toScreen(d.mX2, d.mY2)) < 20) { hoveredLineId = d.id; break; }
                    }
                }
            }
        }

        if (!isDrawing) return;

        if (currentMode === 'free') {
            activeFreehandPoints.push({ x: m.x, y: m.y });
            if (drawings.length === 0 || drawings[drawings.length-1].id !== 'live_free') {
                drawings.push({ id: 'live_free', type: 'freehand', pts: activeFreehandPoints, color: currentColor, thickness: currentThickness, penType: currentPenType, lineStyle: currentLineStyle });
            } else { drawings[drawings.length-1].pts = activeFreehandPoints; }
        }
        else if (currentMode === 'select' && grabbedPlot) {
            if (selectedPlotIds.includes(grabbedPlot.id)) {
                let mDx = m.x - grabbedPlot.mx; let mDy = m.y - grabbedPlot.my;
                plots.forEach(pt => { if (selectedPlotIds.includes(pt.id) && !pt.isFixed) { pt.mx += mDx; pt.my += mDy; } });
            } else if (!grabbedPlot.isFixed) {
                if (grabbedPlot.boundCircleId) {
                    let tc = drawings.find(d => d.id === grabbedPlot.boundCircleId);
                    if (tc) {
                        let cAng = Math.atan2(m.y - tc.mY1, m.x - tc.mX1); let rM = Math.hypot(tc.mX2 - tc.mX1, tc.mY2 - tc.mY1);
                        grabbedPlot.mx = tc.mX1 + rM * Math.cos(cAng); grabbedPlot.my = tc.mY1 + rM * Math.sin(cAng);
                    }
                } else { grabbedPlot.mx = m.x; grabbedPlot.my = m.y; }
            }
            drawings.forEach(d => {
                let p1 = plots.find(p => p.id === d.bindP1); if (p1) { d.mX1 = p1.mx; d.mY1 = p1.my; }
                let p2 = plots.find(p => p.id === d.bindP2); if (p2) { d.mX2 = p2.mx; d.mY2 = p2.my; }
            });
        }
        else if (currentMode === 'select' && grabbedArcInfo) {
            let arcD = grabbedArcInfo.arc;
            let pC = toScreen(arcD.mX1, arcD.mY1);
            let targetAng = Math.atan2(e.clientY - pC.y, e.clientX - pC.x);
            
            if (grabbedArcInfo.node === 'start') {
                arcD.startAngle = targetAng;
            } else {
                arcD.endAngle = targetAng;
            }
        }
        else if (currentMode === 'select' && !grabbedPlot && !grabbedArcInfo && selectedDrawingIds.length === 0) {
            offsetX += dx; offsetY += dy; startX = e.clientX; startY = e.clientY;
        }
        else if (currentMode === 'lasso') lassoPoints.push({ x: e.clientX, y: e.clientY });
        else if (currentMode === 'eraser') { eraserPath.push({ x: e.clientX, y: e.clientY }); executeEraserLogic(e.clientX, e.clientY); }
    }

    function stopDrawing(e) {
        if (!isDrawing) return; isDrawing = false; const m = toMath(e.clientX, e.clientY);
        if (currentMode === 'free') {
            let liveIdx = drawings.findIndex(d => d.id === 'live_free'); if (liveIdx !== -1) drawings.splice(liveIdx, 1);
            drawings.push({ id: generateUniqueId(), type: 'freehand', pts: activeFreehandPoints, color: currentColor, thickness: currentThickness, penType: currentPenType, lineStyle: currentLineStyle });
        }
        else if (['segment', 'line', 'ray', 'vector'].includes(currentMode) && dragStartMath) {
            if (Math.hypot(m.x - dragStartMath.x, m.y - dragStartMath.y) > 0.15) {
                saveHistory(); const p1Id = getNextLabel(); const p2Id = getNextLabel();
                plots.push({ id: p1Id, mx: dragStartMath.x, my: dragStartMath.y, color: currentColor }, { id: p2Id, mx: m.x, my: m.y, color: currentColor });
                drawings.push({ id: generateUniqueId(), type: currentMode, mX1: dragStartMath.x, mY1: dragStartMath.y, mX2: m.x, mY2: m.y, bindP1: p1Id, bindP2: p2Id, color: currentColor, thickness: currentThickness, penType: currentPenType, lineStyle: currentLineStyle });
            }
        }
        else if (currentMode === 'compass' && dragStartMath) {
            if (Math.hypot(m.x - dragStartMath.x, m.y - dragStartMath.y) > 0.15) {
                saveHistory(); drawings.push({ id: generateUniqueId(), type: 'circle', mX1: dragStartMath.x, mY1: dragStartMath.y, mX2: m.x, mY2: m.y, color: currentColor, thickness: currentThickness, penType: currentPenType, lineStyle: currentLineStyle });
            }
        }
        else if (currentMode === 'arc' && dragStartMath) {
            if (Math.hypot(m.x - dragStartMath.x, m.y - dragStartMath.y) > 0.15) {
                saveHistory(); drawings.push({ id: generateUniqueId(), type: 'arc', mX1: dragStartMath.x, mY1: dragStartMath.y, mX2: m.x, mY2: m.y, startAngle: 0, endAngle: Math.PI * 0.75, color: currentColor, thickness: currentThickness, penType: currentPenType, lineStyle: currentLineStyle });
            }
        }
        else if (['parallel', 'perpend'].includes(currentMode) && selectedBaseLine && dragStartMath) {
            if (Math.hypot(m.x - dragStartMath.x, m.y - dragStartMath.y) > 0.15) {
                saveHistory(); let baseAng = Math.atan2(selectedBaseLine.mY2 - selectedBaseLine.mY1, selectedBaseLine.mX2 - selectedBaseLine.mX1);
                let targetAng = (currentMode === 'parallel') ? baseAng : baseAng + Math.PI / 2;
                const p1Id = getNextLabel(); const p2Id = getNextLabel();
                let mx2 = dragStartMath.x + Math.cos(targetAng) * 2; let my2 = dragStartMath.y + Math.sin(targetAng) * 2;
                plots.push({ id: p1Id, mx: dragStartMath.x, my: dragStartMath.y, color: currentColor }, { id: p2Id, mx: mx2, my: my2, color: currentColor });
                drawings.push({ id: generateUniqueId(), type: 'line', mX1: dragStartMath.x, mY1: dragStartMath.y, mX2: mx2, mY2: my2, bindP1: p1Id, bindP2: p2Id, color: currentColor, thickness: currentThickness, penType: currentPenType, lineStyle: currentLineStyle });
            }
        }
        else if (currentMode === 'set-bound' && grabbedPlot) {
            let cc = null;
            for(let d of drawings) {
                if (d.type === 'circle') {
                    let sC = toScreen(d.mX1, d.mY1); if (Math.abs(Math.hypot(e.clientX - sC.x, e.clientY - sC.y) - Math.hypot(toScreen(d.mX2, d.mY2).x - sC.x, toScreen(d.mX2, d.mY2).y - sC.y)) < 30) { cc = d; break; }
                }
            }
            if (cc) { saveHistory(); grabbedPlot.boundCircleId = cc.id; }
        }
        else if (currentMode === 'lasso') processLassoSelection();

        grabbedPlot = null; grabbedArcInfo = null; dragStartMath = null; eraserPath = [];
    }

    function executeEraserLogic(sx, sy) {
        let mPt = toMath(sx, sy);
        
        drawings.forEach(d => { 
            if(d.type === 'freehand') {
                d.pts = d.pts.filter(pt => Math.hypot(sx - toScreen(pt.x, pt.y).x, sy - toScreen(pt.x, pt.y).y) > 25); 
            }
            else if (d.type === 'arc') {
                let pC = toScreen(d.mX1, d.mY1);
                let rS = Math.hypot(toScreen(d.mX2, d.mY2).x - pC.x, toScreen(d.mX2, d.mY2).y - pC.y);
                let distToArcLine = Math.abs(Math.hypot(sx - pC.x, sy - pC.y) - rS);
                
                if (distToArcLine < 25) { 
                    let eraseAngle = Math.atan2(sy - pC.y, sx - pC.x);
                    let sA = d.startAngle;
                    let eA = d.endAngle;
                    
                    let diffStart = Math.abs(eraseAngle - sA);
                    let diffEnd = Math.abs(eraseAngle - eA);
                    
                    if (diffStart < diffEnd && diffStart < 0.5) {
                        d.startAngle = eraseAngle + 0.12;
                    } else if (diffEnd < diffStart && diffEnd < 0.5) {
                        d.endAngle = eraseAngle - 0.12;
                    }
                }
            }
            else if (d.type === 'circle') {
                let pC = toScreen(d.mX1, d.mY1);
                let rS = Math.hypot(toScreen(d.mX2, d.mY2).x - pC.x, toScreen(d.mX2, d.mY2).y - pC.y);
                let distToCircleEdge = Math.abs(Math.hypot(sx - pC.x, sy - pC.y) - rS);
                
                if (distToCircleEdge < 25) {
                    let hitAngle = Math.atan2(sy - pC.y, sx - pC.x);
                    d.type = 'arc';
                    let gap = 0.35;
                    let startA = hitAngle + gap;
                    let endA = hitAngle + (Math.PI * 2) - gap;
                    
                    if (startA > Math.PI * 2) startA -= Math.PI * 2;
                    if (endA > Math.PI * 2) endA -= Math.PI * 2;
                    
                    if (startA > endA) {
                        d.startAngle = startA;
                        d.endAngle = endA + Math.PI * 2;
                    } else {
                        d.startAngle = startA;
                        d.endAngle = endA;
                    }
                }
            }
        });
        
        drawings = drawings.filter(d => (d.type !== 'freehand' || d.pts.length > 1) && (d.type !== 'arc' || d.endAngle > d.startAngle));
        
        let drawToDelete = null;
        for(let d of drawings) {
            if(['segment','line','ray','vector','arc'].includes(d.type)) {
                if (d.type !== 'freehand' && d.type !== 'arc') {
                    if (distToSegment({x: sx, y: sy}, toScreen(d.mX1, d.mY1), toScreen(d.mX2, d.mY2)) < 16) { drawToDelete = d; break; }
                }
            }
        }
        if (drawToDelete) { 
            drawings = drawings.filter(d => d.id !== drawToDelete.id); 
            plots = plots.filter(p => p.id !== drawToDelete.bindP1 && p.id !== drawToDelete.bindP2); 
        }

        plots = plots.filter(p => {
            const shouldDelete = (Math.hypot(sx - toScreen(p.mx, p.my).x, sy - toScreen(p.mx, p.my).y) < 20);
            if (shouldDelete) {
                activeMeasures = activeMeasures.filter(m => m.p1 !== p.id && m.p2 !== p.id && m.p3 !== p.id);
            }
            return !shouldDelete;
        });
    }

    function processLassoSelection() {
        if (lassoPoints.length < 3) return;
        selectedPlotIds = []; selectedDrawingIds = [];
        plots.forEach(p => { if (isPointInPolygon(toScreen(p.mx, p.my), lassoPoints)) selectedPlotIds.push(p.id); });
        drawings.forEach(d => {
            if (['segment','line','ray','vector'].includes(d.type)) {
                if (isPointInPolygon(toScreen(d.mX1, d.mY1), lassoPoints) && isPointInPolygon(toScreen(d.mX2, d.mY2), lassoPoints)) selectedDrawingIds.push(d.id);
            }
        });
    }

    function isPointInPolygon(pt, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            let xi = poly[i].x, yi = poly[i].y; let xj = poly[j].x, yj = poly[j].y;
            let intersect = ((yi > pt.y) !== (yj > pt.y)) && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    function distToSegment(p, v, w) {
        let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2); if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2; t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    canvas.addEventListener('touchstart', e => { if(e.touches.length === 1) startDrawing(e.touches[0]); }, {passive: true});
    canvas.addEventListener('touchmove', e => { if(e.touches.length === 1) draw(e.touches[0]); }, {passive: true});
    canvas.addEventListener('touchend', e => { stopDrawing(e.changedTouches[0]); });

    window.addEventListener('wheel', e => {
        e.preventDefault();
        const mBefore = toMath(e.clientX, e.clientY);
        if (e.deltaY < 0) scale *= 1.08; else scale /= 1.08;
        scale = Math.max(0.15, Math.min(20, scale));
        const sAfter = toScreen(mBefore.x, mBefore.y);
        offsetX += (e.clientX - sAfter.x); offsetY += (e.clientY - sAfter.y);
    }, { passive: false });

    function saveData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ drawings, plots, activeMeasures, groups, labelIndex }));
        const dlAnchor = document.createElement('a'); dlAnchor.setAttribute("href", dataStr); dlAnchor.setAttribute("download", "blackboard_geometry.json");
        document.body.appendChild(dlAnchor); dlAnchor.click(); dlAnchor.remove();
    }
    function triggerJsonUpload() { document.getElementById('jsonInput').click(); }
    function loadData(el) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const parsed = JSON.parse(e.target.result); saveHistory();
                drawings = parsed.drawings || []; plots = parsed.plots || []; activeMeasures = parsed.activeMeasures || []; groups = parsed.groups || []; labelIndex = parsed.labelIndex || 0;
            } catch(err) { alert("JSONファイルの読み込みに失敗しました。"); }
        };
        if(el.files[0]) reader.readAsText(el.files[0]);
    }

    // ドラッグ移動可能なツールバー
    const tbHandle = document.getElementById('myToolbarHandle');
    const myTb = document.getElementById('myToolbar');
    let isDraggingToolbar = false; let tbOffsetX = 0; let tbOffsetY = 0;
    
    tbHandle.addEventListener('mousedown', e => { isDraggingToolbar = true; tbOffsetX = e.clientX - myTb.offsetLeft; tbOffsetY = e.clientY - myTb.offsetTop; e.preventDefault(); });
    window.addEventListener('mousemove', e => { if (!isDraggingToolbar) return; myTb.style.left = (e.clientX - tbOffsetX) + 'px'; myTb.style.top = (e.clientY - tbOffsetY) + 'px'; });
    window.addEventListener('mouseup', () => isDraggingToolbar = false);
    
    tbHandle.addEventListener('touchstart', e => { isDraggingToolbar = true; tbOffsetX = e.touches[0].clientX - myTb.offsetLeft; tbOffsetY = e.touches[0].clientY - myTb.offsetTop; }, {passive:true});
    window.addEventListener('touchmove', e => { if (!isDraggingToolbar) return; myTb.style.left = (e.touches[0].clientX - tbOffsetX) + 'px'; myTb.style.top = (e.touches[0].clientY - tbOffsetY) + 'px'; }, {passive:true});
    window.addEventListener('touchend', () => isDraggingToolbar = false);

    // 初期化起動
    updateDropdowns();
    renderKidsKeyboard();
    parseAndSyncFractionDisplay("0.2*x*x");
    updateInfoMeterInstructions();
    tick();
</script>
